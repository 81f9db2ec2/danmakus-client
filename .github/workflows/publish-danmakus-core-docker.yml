name: publish-danmakus-core-docker

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver version without prefix, e.g. 1.2.3'
        required: true
        type: string
      latest:
        description: 'Also publish the latest tag'
        required: false
        default: false
        type: boolean
  push:
    tags:
      - 'danmakus-core-v*'

jobs:
  publish-danmakus-core-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: resolve version
        id: vars
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
            latest="${{ inputs.latest }}"
          else
            version="${GITHUB_REF_NAME#danmakus-core-v}"
            if [[ "$version" == *-* ]]; then
              latest="false"
            else
              latest="true"
            fi
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version: $version" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"

      - name: set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: extract docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/danmakus-core
          labels: |
            org.opencontainers.image.title=danmakus-core
            org.opencontainers.image.description=Danmakus core Docker image
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=v${{ steps.vars.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ steps.vars.outputs.version }}
            type=semver,pattern={{major}},value=v${{ steps.vars.outputs.version }},enable=${{ !startsWith(steps.vars.outputs.version, '0.') }}
            type=raw,value=latest,enable=${{ steps.vars.outputs.latest == 'true' }}

      - name: login to ghcr
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build and publish image
        uses: docker/build-push-action@v6
        with:
          context: ./danmakus-core
          file: ./danmakus-core/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
